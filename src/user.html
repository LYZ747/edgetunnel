<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VLESS EdgeTunnel Network</title>
    <style>
      :root {
        --primary: #3b82f6;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #1e293b;
        --border: #e2e8f0;
        --shadow: rgba(0, 0, 0, 0.05);
        --input-bg: #f1f5f9;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --primary: #60a5fa;
          --bg: #0f172a;
          --card: #1e293b;
          --text: #f8fafc;
          --border: #334155;
          --shadow: rgba(0, 0, 0, 0.3);
          --input-bg: #0f172a;
        }
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 2rem 1rem;
        margin: 0;
        line-height: 1.6;
      }
      .container {
        max-width: 750px;
        margin: 0 auto;
      }
      .header {
        text-align: center;
        margin-bottom: 2.5rem;
      }
      .header h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin: 0;
        letter-spacing: -0.025em;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 4px 20px var(--shadow);
      }
      .card h2 {
        margin-top: 0;
        font-size: 1.25rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1rem;
        margin-bottom: 1.25rem;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        font-size: 0.95rem;
      }
      .desc {
        font-size: 0.85rem;
        color: #64748b;
        margin-bottom: 1rem;
        display: block;
      }
      select {
        width: 100%;
        padding: 0.875rem 1rem;
        border-radius: 10px;
        border: 2px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s;
        outline: none;
        appearance: none;
        margin-bottom: 1rem;
      }
      select:focus {
        border-color: var(--primary);
      }
      .info {
        font-size: 0.85rem;
        color: #64748b;
        padding: 1rem;
        background: rgba(100, 116, 139, 0.1);
        border-radius: 8px;
        border-left: 4px solid var(--primary);
      }
      .info code {
        background: var(--card);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-family: monospace;
        color: var(--primary);
      }
      .status {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
        background: rgba(59, 130, 246, 0.1);
        color: var(--primary);
        margin-bottom: 1.5rem;
      }
      .input-group {
        display: flex;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid var(--border);
        transition: border-color 0.2s;
      }
      .input-group:not(:last-child) {
        margin-bottom: 1rem;
      }
      .input-group:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
      }
      .input-group input {
        flex: 1;
        padding: 0.75rem 1rem;
        border: none;
        background: var(--input-bg);
        color: var(--text);
        font-family: monospace;
        font-size: 0.85rem;
        outline: none;
      }
      .input-group .btn-icon {
        background: var(--card);
        color: var(--text);
        border: none;
        border-left: 1px solid var(--border);
        padding: 0 1rem;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.85rem;
        transition: background 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .input-group .btn-icon:hover {
        background: rgba(59, 130, 246, 0.1);
        color: var(--primary);
      }
      .tag {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.7rem;
        background: var(--primary);
        color: white;
        margin-left: 6px;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>⚡ VLESS 边缘网络中枢</h1>
      </div>
      <div class="card">
        <h2>⚙️ 出站反代路由策略设置</h2>
        <label for="modeSelect">出口反代模式 (实时生效)</label>
        <span class="desc">选择后，下方的单节点链接与订阅链接将同步更新</span>
        <select id="modeSelect" onchange="updateUI()">
          <option value="ip">🌐 优选独立 Proxy IP (主流云厂商/数据中心) - 适合日常代理与加速</option>
          <option value="nat64">🚀 NAT64 IPv6 动态透传 (荷兰/美国本地ISP) - 强制分配纯净出口，解锁更多应用</option>
        </select>
        <div class="info">
          <strong>💡 无状态切换：</strong><br />
          Worker/Page 后端不存储此项配置。您的选择将作为 <code>pm=xxx</code> 参数，直接注入到单节点 vless 的
          <code>path</code> 路径中。客户端发起连接时，后端通过解析路径参数实时决定反代路由走向。
        </div>
      </div>
      <div class="card">
        <h2>🚀 快速体验</h2>
        <span class="desc">您可以直接复制此节点至 v2ray 等客户端中验证当前代理模式的连通性。</span>
        <div class="status" id="statusBadge">就绪</div>
        <label>VLESS 协议直连链接 <span class="tag">${pt}</span></label>
        <div class="input-group">
          <input type="text" id="vlSample" readonly />
          <button class="btn-icon" onclick="copyElement('vlSample')" title="复制">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg
            >&nbsp;复制
          </button>
        </div>
      </div>
      <div class="card">
        <h2>🔗 客户端订阅分发网络</h2>
        <span class="desc">链接已包含对应模式参数。</span>
        <label>通用订阅 (Base64) <span class="tag">V2ray / Shadowrocket</span></label>
        <div class="input-group">
          <input type="text" id="subBase64" readonly />
          <button class="btn-icon" onclick="copyElement('subBase64')">复制</button>
          <button class="btn-icon" onclick="openElement('subBase64')">预览</button>
        </div>
        <label>Clash 订阅 <span class="tag">Clash Meta / Verge</span></label>
        <div class="input-group">
          <input type="text" id="subCl" readonly />
          <button class="btn-icon" onclick="copyElement('subCl')">复制</button>
          <button class="btn-icon" onclick="openElement('subCl')">预览</button>
        </div>
        <label>Singbox 订阅 <span class="tag">SFI / SFA</span></label>
        <div class="input-group">
          <input type="text" id="subSb" readonly />
          <button class="btn-icon" onclick="copyElement('subSb')">复制</button>
          <button class="btn-icon" onclick="openElement('subSb')">预览</button>
        </div>
        <label>Surge 订阅 <span class="tag">iOS / Mac</span></label>
        <div class="input-group">
          <input type="text" id="subSg" readonly />
          <button class="btn-icon" onclick="copyElement('subSg')">复制</button>
          <button class="btn-icon" onclick="openElement('subSg')">预览</button>
        </div>
      </div>
      <div>
        <p align="center">相关说明见：<a href="https://my-onedrive.pages.dev" target="_blank">EdgeTunnel</a></p>
        <h3 align="center">若对您有帮助，可考虑给予支持/赞赏，以便于后续的维护与优化，感激不尽🙏</h3>
      </div>
    </div>
    <script>
      const vSample = "${vSample}";
      function buildVLink(mode) {
        const path = encodeURIComponent("/?pm=" + mode);
        return vSample.slice(0, vSample.indexOf("path=")) + `path=${path}#${host}${mode == "nat64" ? "-nat64" : ""}`;
      }
      function buildBaseSub(mode) {
        return "https://${host}/sub/${userID}?pm=" + mode;
      }
      function buildConvertSub(mode, target) {
        const rawUrl = encodeURIComponent(buildBaseSub(mode));
        return `https://yun-api.subcloud.xyz/sub?target=${target}&url=${rawUrl}&insert=false&emoji=true&list=false&tfo=false&scv=true&fdn=false&sort=false&new_name=true`; // api.v1.mk/sub url.v1.mk/sub
      }
      function updateUI() {
        const mode = document.getElementById("modeSelect").value;
        localStorage.setItem("pm", mode);
        // update status
        const modeName = mode === "nat64" ? "NAT64 IPv6 动态透传" : "Proxy IP 优选";
        document.getElementById("statusBadge").innerHTML = `当前参数: <strong>pm=${mode}</strong> (${modeName})`;
        // fill inputs
        document.getElementById("vlSample").value = buildVLink(mode);
        document.getElementById("subBase64").value = buildBaseSub(mode);
        document.getElementById("subCl").value = buildConvertSub(mode, "clash");
        document.getElementById("subSb").value = buildConvertSub(mode, "singbox");
        document.getElementById("subSg").value = buildConvertSub(mode, "surge");
      }
      function copyElement(id) {
        const input = document.getElementById(id);
        input.select();
        navigator.clipboard
          .writeText(input.value)
          .then(() => {
            const originalBg = input.style.background;
            input.style.background = "rgba(16, 185, 129, 0.2)"; // green
            setTimeout(() => {
              input.style.background = originalBg;
            }, 300);
            alert("✅ 链接已复制成功！");
          })
          .catch(err => {
            alert("❌ 复制失败，请手动选择复制。");
          });
      }
      function openElement(id) {
        const url = document.getElementById(id).value;
        window.open(url, "_blank");
      }
      // init
      document.addEventListener("DOMContentLoaded", () => {
        const savedMode = localStorage.getItem("pm") || "nat64";
        document.getElementById("modeSelect").value = savedMode;
        updateUI();
      });
    </script>
  </body>
</html>
